<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>濒危物种 | 碎片中的生命</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            color: #333;
            transition: background-color 0.8s ease;
        }

        .main-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
        }

        .intro-slide {
            flex-direction: row;
            text-align: left;
            background: linear-gradient(180deg, #ffffff 0%, #f0f0f0 50%, #e0e0e0 100%);
            color: #333;
            position: relative;
            overflow: hidden;
        }

        .intro-slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.9) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 50%, rgba(240,240,240,0.3) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .intro-left {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
            max-width: 45%;
            position: relative;
            z-index: 1;
        }

        .intro-header { margin-bottom: 60px; }

        .intro-title {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 12px;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .intro-subtitle {
            font-size: 1.4rem;
            font-weight: 300;
            color: #666;
            letter-spacing: 6px;
        }

        .intro-message {
            font-size: 1rem;
            font-weight: 300;
            color: #999;
            letter-spacing: 2px;
            margin-bottom: 50px;
            line-height: 2;
        }

        .start-btn {
            display: inline-block;
            padding: 20px 50px;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 4px;
            background: #333;
            border: none;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            width: fit-content;
        }

        .start-btn:hover {
            background: #555;
            transform: translateX(10px);
        }

        .intro-right {
            flex: 1;
            height: 100%;
            position: relative;
            background: linear-gradient(180deg, #ffffff 0%, #f5f5f5 50%, #e8e8e8 100%);
            overflow: hidden;
            z-index: 1;
        }

        .intro-scene {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .lp-mountain-far {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 120px solid transparent;
            border-right: 120px solid transparent;
            border-bottom: 180px solid #7fb685;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }
        .lp-mountain-far::before {
            content: '';
            position: absolute;
            left: -60px;
            top: 80px;
            width: 0;
            height: 0;
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
            border-bottom: 80px solid #9ccda0;
        }
        .lp-mt-far-1 { left: 5%; bottom: 25%; transform: scale(0.8); opacity: 0.7; }
        .lp-mt-far-2 { left: 30%; bottom: 20%; transform: scale(1.2); opacity: 0.6; }
        .lp-mt-far-3 { right: 10%; bottom: 22%; transform: scale(0.9); opacity: 0.65; }

        .lp-mountain-near {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 140px solid #5a9e5f;
        }
        .lp-mountain-near::after {
            content: '';
            position: absolute;
            left: -40px;
            top: 60px;
            width: 0;
            height: 0;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            border-bottom: 60px solid #6eb56f;
        }
        .lp-mt-near-1 { left: 15%; bottom: 15%; opacity: 0.8; }
        .lp-mt-near-2 { right: 20%; bottom: 18%; transform: scale(1.1); opacity: 0.75; }

        .lp-water {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 60px;
        }
        .lp-water-triangle {
            position: absolute;
            width: 0;
            height: 0;
            opacity: 0.5;
        }
        .lp-w-1 { border-left: 80px solid transparent; border-right: 80px solid transparent; border-bottom: 30px solid #7fcdcd; left: 0; top: 0; }
        .lp-w-2 { border-left: 60px solid transparent; border-right: 60px solid transparent; border-bottom: 25px solid #9fd4d4; left: 100px; top: 10px; }
        .lp-w-3 { border-left: 70px solid transparent; border-right: 70px solid transparent; border-bottom: 35px solid #6bc4c4; left: 180px; top: 5px; }
        .lp-w-4 { border-left: 50px solid transparent; border-right: 50px solid transparent; border-bottom: 20px solid #b8e0e0; left: 280px; top: 15px; }
        .lp-w-5 { border-left: 40px solid transparent; border-right: 40px solid transparent; border-bottom: 28px solid #8ddada; left: 320px; top: 0; }

        .lp-pine {
            position: absolute;
            width: 0;
            height: 0;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.15));
        }
        .lp-pine-top {
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 50px solid #3d6b42;
        }
        .lp-pine-mid {
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 40px solid #4a7d52;
            position: absolute;
            top: 35px;
            left: -30px;
        }
        .lp-pine-base {
            border-left: 35px solid transparent;
            border-right: 35px solid transparent;
            border-bottom: 35px solid #5a8f62;
            position: absolute;
            top: 65px;
            left: -35px;
        }
        .lp-pine-trunk {
            position: absolute;
            width: 8px;
            height: 20px;
            background: #5d4037;
            top: 95px;
            left: -4px;
        }
        .lp-pine-1 { left: 8%; bottom: 20%; transform: scale(0.9); }
        .lp-pine-2 { left: 22%; bottom: 18%; transform: scale(1.1); }
        .lp-pine-3 { right: 12%; bottom: 22%; transform: scale(0.8); }
        .lp-pine-4 { right: 28%; bottom: 16%; transform: scale(1.2); }

        .lp-bamboo {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .lp-bamboo-segment {
            width: 6px;
            height: 25px;
            background: linear-gradient(90deg, #558b2f 0%, #7cb342 50%, #558b2f 100%);
            position: relative;
        }
        .lp-bamboo-segment::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 3px;
            background: #33691e;
            left: -2px;
            top: 0;
        }
        .lp-bamboo-leaf {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-bottom: 8px solid #689f38;
        }
        .lp-bamboo-1 { left: 5%; bottom: 25%; transform: scale(0.9); }
        .lp-bamboo-1 .lp-bamboo-leaf { top: 10px; left: 5px; transform: rotate(-30deg); }
        .lp-bamboo-2 { left: 35%; bottom: 28%; transform: scale(1.1); }
        .lp-bamboo-2 .lp-bamboo-leaf { top: 20px; left: -10px; transform: rotate(20deg); }
        .lp-bamboo-3 { right: 8%; bottom: 24%; transform: scale(0.85); }

        .lp-tree {
            position: absolute;
            filter: drop-shadow(2px 3px 5px rgba(0,0,0,0.12));
        }
        .lp-tree-crown {
            width: 0;
            height: 0;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            border-bottom: 70px solid #4caf50;
            position: relative;
        }
        .lp-tree-crown::before {
            content: '';
            position: absolute;
            left: -25px;
            top: 30px;
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 50px solid #66bb6a;
        }
        .lp-tree-crown::after {
            content: '';
            position: absolute;
            left: -15px;
            top: 55px;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 35px solid #81c784;
        }
        .lp-tree-trunk {
            width: 10px;
            height: 25px;
            background: linear-gradient(90deg, #5d4037 0%, #8d6e63 50%, #5d4037 100%);
            margin: 0 auto;
        }
        .lp-tree-1 { left: 45%; bottom: 18%; transform: scale(0.9); }
        .lp-tree-2 { right: 5%; bottom: 20%; transform: scale(0.7); }

        .intro-animals {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 30px;
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 90%;
        }

        .intro-animal {
            position: relative;
            cursor: pointer;
            transition: transform 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .intro-animal:hover {
            transform: translateY(-20px) scale(1.15);
        }

        .animal-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: #555;
            letter-spacing: 1px;
            margin-top: 10px;
            text-align: center;
        }

        .slide-content {
            display: flex;
            width: 90%;
            max-width: 1400px;
            height: 80%;
            align-items: center;
            justify-content: space-between;
        }

        .animal-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            height: 100%;
        }

        .animal-wrapper {
            position: relative;
            width: 450px;
            height: 450px;
            transform-style: preserve-3d;
            perspective: 1000px;
            z-index: 1;
        }

        .poly-face {
            position: absolute;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        .poly-face:hover {
            filter: brightness(1.15);
            transform: translateZ(8px) scale(1.02);
        }

        .slide.active .poly-face {
            opacity: 1;
        }

        .info-panel {
            flex: 1;
            padding: 40px;
            max-width: 520px;
        }

        .species-number {
            font-size: 6rem;
            font-weight: 200;
            line-height: 1;
            opacity: 0.06;
            position: absolute;
            top: -10px;
            left: -10px;
            letter-spacing: -5px;
        }

        .species-title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 8px;
            position: relative;
        }

        .species-pinyin {
            font-size: 0.5em;
            font-weight: 300;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
            margin-left: 8px;
        }

        .species-latin {
            font-size: 0.9rem;
            font-weight: 300;
            color: rgba(255,255,255,0.4);
            margin-bottom: 24px;
            letter-spacing: 2px;
            font-style: italic;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 20px;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 32px;
            border: 1px solid;
        }

        .status-critical { color: #e74c3c; border-color: #e74c3c; }
        .status-endangered { color: #e67e22; border-color: #e67e22; }
        .status-vulnerable { color: #f1c40f; border-color: #f1c40f; }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .info-item {
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-label {
            font-size: 0.6rem;
            font-weight: 500;
            color: rgba(255,255,255,0.35);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 400;
            color: #fff;
        }

        .info-value.highlight {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .species-desc {
            font-size: 0.85rem;
            font-weight: 300;
            line-height: 2;
            color: rgba(255,255,255,0.6);
            margin-bottom: 24px;
        }

        .habitat-section {
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
        }

        .habitat-title {
            font-size: 0.6rem;
            font-weight: 500;
            color: rgba(255,255,255,0.35);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .habitat-value {
            font-size: 0.8rem;
            font-weight: 300;
            color: rgba(255,255,255,0.7);
            line-height: 1.8;
        }

        .nav-dots {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .nav-dot {
            width: 6px;
            height: 6px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-dot:hover { transform: scale(1.5); }
        .nav-dot.active { background: #333; border-color: #333; }
        body:has(.slide.active:not(.intro-slide)) .nav-dot.active { background: #fff; border-color: #fff; }

        .nav-arrows {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
            pointer-events: none;
        }

        .nav-arrow {
            width: 50px;
            height: 50px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            pointer-events: auto;
            font-size: 1rem;
            color: rgba(0, 0, 0, 0.3);
            background: transparent;
        }

        body:has(.slide.active:not(.intro-slide)) .nav-arrow {
            border-color: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.4);
        }

        .nav-arrow:hover {
            border-color: rgba(0, 0, 0, 0.4);
            color: #333;
        }

        body:has(.slide.active:not(.intro-slide)) .nav-arrow:hover {
            border-color: rgba(255, 255, 255, 0.6);
            color: #fff;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 6px;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        body:has(.slide.active:not(.intro-slide)) .logo { color: rgba(255,255,255,0.8); }
        .logo:hover { opacity: 0.7; }
        .logo span { font-weight: 300; color: #999; }
        body:has(.slide.active:not(.intro-slide)) .logo span { color: rgba(255,255,255,0.4); }

        .counter {
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 3px;
            color: #999;
        }

        body:has(.slide.active:not(.intro-slide)) .counter { color: rgba(255,255,255,0.4); }
        .counter .current { color: #333; font-size: 1rem; font-weight: 700; }
        body:has(.slide.active:not(.intro-slide)) .counter .current { color: #fff; }

        .progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 1px;
            background: #333;
            transition: width 0.5s ease;
        }

        body:has(.slide.active:not(.intro-slide)) .progress-bar { background: rgba(255,255,255,0.8); }

        .click-ripple {
            position: fixed;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.1);
            pointer-events: none;
            animation: ripple 0.6s ease-out forwards;
            z-index: 9999;
        }

        body:has(.slide.active:not(.intro-slide)) .click-ripple { background: rgba(255, 255, 255, 0.2); }

        @keyframes ripple {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 80px; height: 80px; opacity: 0; }
        }

        @media (max-width: 1024px) {
            .slide-content { flex-direction: column; justify-content: center; text-align: center; }
            .animal-wrapper { width: 280px; height: 280px; }
            .info-panel { padding: 20px; max-width: 100%; }
            .species-title { font-size: 2.2rem; }
            .info-grid { grid-template-columns: 1fr; }
            .nav-arrows { padding: 0 15px; }
            .nav-arrow { width: 40px; height: 40px; }
            .intro-slide { flex-direction: column; }
            .intro-left { max-width: 100%; padding: 40px 20px; }
            .intro-title { font-size: 2.5rem; }
            .intro-right { display: none; }
            .intro-animals { grid-template-columns: repeat(5, 1fr); gap: 10px; }
        }

        @keyframes float3d {
            0%, 100% { transform: translateY(0) rotateY(0deg) rotateX(0deg); }
            25% { transform: translateY(-10px) rotateY(2deg) rotateX(1deg); }
            50% { transform: translateY(-5px) rotateY(0deg) rotateX(2deg); }
            75% { transform: translateY(-15px) rotateY(-2deg) rotateX(0deg); }
        }

        .floating { animation: float3d 6s ease-in-out infinite; }

        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            animation: particleFade 0.8s ease-out forwards;
        }

        @keyframes particleFade {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 0; transform: scale(0) translateY(-30px); }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo" onclick="goToSlide(0)">IN <span>PIECES</span></div>
        <div class="counter"><span class="current">00</span> / 10</div>
    </header>

    <div class="main-container" id="mainContainer"></div>

    <div class="nav-arrows" id="navArrows" style="display: none;">
        <div class="nav-arrow" onclick="prevSlide()">←</div>
        <div class="nav-arrow" onclick="nextSlide()">→</div>
    </div>

    <div class="nav-dots" id="navDots"></div>

    <div class="progress-bar" id="progressBar"></div>

    <script>
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(frequency, duration, volume, type = 'sine') {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function playClickSound() {
            playTone(700, 0.05, 0.15);
        }

        function playAnimalSound(speciesId) {
            audioContext.resume();
            
            const sounds = {
                panda: () => {
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            const osc = audioContext.createOscillator();
                            const gain = audioContext.createGain();
                            const filter = audioContext.createBiquadFilter();
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(audioContext.destination);
                            osc.type = 'sawtooth';
                            osc.frequency.setValueAtTime(180, audioContext.currentTime);
                            osc.frequency.exponentialRampToValueAtTime(120, audioContext.currentTime + 0.4);
                            filter.type = 'lowpass';
                            filter.frequency.value = 600;
                            gain.gain.setValueAtTime(0.12, audioContext.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                            osc.start(audioContext.currentTime);
                            osc.stop(audioContext.currentTime + 0.5);
                        }, i * 450);
                    }
                },
                tiger: () => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    const filter = audioContext.createBiquadFilter();
                    osc.connect(filter);
                    filter.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(80, audioContext.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(45, audioContext.currentTime + 1.5);
                    filter.type = 'lowpass';
                    filter.frequency.value = 300;
                    gain.gain.setValueAtTime(0.18, audioContext.currentTime);
                    gain.gain.linearRampToValueAtTime(0.25, audioContext.currentTime + 0.4);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1.8);
                    osc.start(audioContext.currentTime);
                    osc.stop(audioContext.currentTime + 1.8);
                },
                elephant: () => {
                    for (let i = 0; i < 2; i++) {
                        setTimeout(() => {
                            const osc = audioContext.createOscillator();
                            const gain = audioContext.createGain();
                            const filter = audioContext.createBiquadFilter();
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(audioContext.destination);
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(70 + i * 15, audioContext.currentTime);
                            osc.frequency.exponentialRampToValueAtTime(35, audioContext.currentTime + 1.8);
                            filter.type = 'lowpass';
                            filter.frequency.value = 250;
                            gain.gain.setValueAtTime(0.22, audioContext.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 2);
                            osc.start(audioContext.currentTime);
                            osc.stop(audioContext.currentTime + 2);
                        }, i * 250);
                    }

        let currentSlide = 0;

        function createSlides() {
            const container = document.getElementById('mainContainer');

            const introSlide = document.createElement('div');

                        </div>

            container.appendChild(introSlide);

            const introAnimals = document.getElementById('introAnimals');
            speciesData.forEach((species, index) => {
                const animalDiv = document.createElement('div');
                animalDiv.className = 'intro-animal';
                animalDiv.onclick = () => { goToSlide(index + 1); playClickSound(); };

                    <div class="intro-animal-wrapper">

                                    border-bottom: ${getFaceSize(f.points).bottom * 0.145}px solid ${f.color};
                                    left: ${getFacePos(f.points).x}%;

                                    transform: translateZ(${f.z * 0.35}px);

                introAnimals.appendChild(animalDiv);
            });

            const introDot = document.createElement('div');
            introDot.className = 'nav-dot active';
            introDot.onclick = () => goToSlide(0);
            navDots.appendChild(introDot);

            speciesData.forEach((species, index) => {
                const slide = document.createElement('div');
                slide.className = 'slide';
                slide.dataset.bgColor = species.bgColor;
                slide.innerHTML = `
                    <div class="slide-content">
                        <div class="animal-stage">
                            <div class="animal-wrapper floating" id="animal-${species.id}">
                                ${species.faces.map((f, i) => 
                                    `<div class="poly-face" data-index="${i}" style="
                                        width: 0;
                                        height: 0;
                                        border-left: ${getFaceSize(f.points).left}px solid transparent;
                                        border-right: ${getFaceSize(f.points).right}px solid transparent;
                                        border-bottom: ${getFaceSize(f.points).bottom}px solid ${f.color};
                                        left: ${getFacePos(f.points).x}%;
                                        top: ${getFacePos(f.points).y}%;
                                        transition-delay: ${f.delay}s;
                                        transform: translateZ(${f.z}px);
                                    "></div>`
                                ).join('')}

                        </div>

                            <p class="species-latin">${species.latin}</p>
                            <span class="status-badge ${species.statusClass}">${species.status}</span>
                            <div class="info-grid">
                                <div class="info-item">
                                    <div class="info-label">野生数量</div>
                                    <div class="info-value highlight">${species.count}</div>

                                <div class="info-item">
                                    <div class="info-label">寿命</div>
                                    <div class="info-value">${species.lifespan}</div>

                                    <div class="info-label">食性</div>
                                    <div class="info-value">${species.diet}</div>
                                </div>

                const dot = document.createElement('div');
                dot.className = 'nav-dot';
                dot.onclick = () => { goToSlide(index + 1); playClickSound(); };
                navDots.appendChild(dot);
            });

            updateProgress();
            addClickEffects();
        }

        function getFaceSize(points) {
            const xs = points.map(p => p[0]);
            const ys = points.map(p => p[1]);
            const base = Math.max(...xs) - Math.min(...xs);
            const height = Math.max(...ys) - Math.min(...ys);
            return {
                left: base / 2 * 4.5,
                right: base / 2 * 4.5,
                bottom: height * 4.5
            };
        }

        function getFacePos(points) {
            const xs = points.map(p => p[0]);
            const ys = points.map(p => p[1]);
            return { x: Math.min(...xs), y: Math.min(...ys) };
        }

        function updateBackground() {
            const slide = document.querySelector('.slide.active');
            if (slide && slide.dataset.bgColor) {
                document.body.style.backgroundColor = slide.dataset.bgColor;
                document.body.style.color = '#fff';
            } else {
                document.body.style.backgroundColor = '#fff';
                document.body.style.color = '#333';
            }
        }

        function goToSlide(index) {
            const slides = document.querySelectorAll('.slide');
            const dots = document.querySelectorAll('.nav-dot');
            const navArrows = document.getElementById('navArrows');
            
            slides[currentSlide].classList.remove('active');
            dots[currentSlide].classList.remove('active');
            
            currentSlide = index;
            
            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
            
            updateCounter();
            updateProgress();
            updateBackground();
            
            if (index === 0) {
                navArrows.style.display = 'none';
            } else {
                navArrows.style.display = 'flex';
                const speciesIndex = index - 1;
                if (speciesIndex >= 0 && speciesIndex < speciesData.length) {
                    playAnimalSound(speciesData[speciesIndex].id);
                }
            }
        }

        function nextSlide() {
            goToSlide((currentSlide + 1) % (totalSlides + 1));
        }

        function prevSlide() {
            goToSlide((currentSlide - 1 + totalSlides + 1) % (totalSlides + 1));
        }

        function updateCounter() {
            document.querySelector('.counter .current').textContent = currentSlide === 0 ? '00' : String(currentSlide).padStart(2, '0');
        }

        function updateProgress() {
            document.getElementById('progressBar').style.width = `${(currentSlide / (totalSlides + 1)) * 100}%`;
        }

        function addClickEffects() {
            document.addEventListener('click', (e) => {
                const ripple = document.createElement('div');
                ripple.className = 'click-ripple';
                ripple.style.left = (e.clientX - 40) + 'px';
                ripple.style.top = (e.clientY - 40) + 'px';
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);

                for (let i = 0; i < 3; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = e.clientX + 'px';
                    particle.style.top = e.clientY + 'px';
                    particle.style.width = '4px';
                    particle.style.height = '4px';
                    particle.style.background = currentSlide === 0 ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.3)';
                    particle.style.transform = `translate(${(Math.random() - 0.5) * 60}px, ${(Math.random() - 0.5) * 60}px)`;
                    document.body.appendChild(particle);
                    setTimeout(() => particle.remove(), 800);
                }
            });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextSlide();
            else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevSlide();
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
        document.addEventListener('touchend', (e) => {
            const diff = touchStartX - e.changedTouches[0].screenX;
            if (Math.abs(diff) > 50) diff > 0 ? nextSlide() : prevSlide();
        });

        createSlides();
    </script>
